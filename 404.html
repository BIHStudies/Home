<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    
    <script>
      var currentPath = window.location.pathname;

      // 1. Check for that specific "old-old" long link
      if (currentPath.includes("support-the-bhaktivedanta-institute-for-higher-studies")) {
          window.location.replace("https://bihstudies.org/donations");
      } 
      // 2. Otherwise, just strip "/Home" and send to the new site normally
      else {
          var cleanPath = currentPath.replace(/^\/Home/, "");
          window.location.replace("https://bihstudies.org" + cleanPath);
      }
    </script>
    
  </head>
  <body>
    Redirecting you to <a href="https://bihstudies.org/">bihstudies.org</a>...
  </body>
</html>
